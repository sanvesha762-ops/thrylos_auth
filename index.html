<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THRYLOS Verify — Official Document Verification</title>
    <meta name="description" content="Verify official THRYLOS documents using QR code scanner or verification ID. Secure, trusted digital verification system.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-logo">
        <span>THRYLOS</span>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i data-lucide="shield-check" class="logo-icon"></i>
                <span class="logo-text">THRYLOS <span class="verify-text">VERIFY</span></span>
            </div>
            <button class="login-btn">
                <i data-lucide="log-in" class="login-icon"></i> Login / Sign Up
            </button>
        </div>
    </nav>

    <main class="main-container">
        <!-- Hero Section -->
        <section class="hero-section">
            <div class="center-logo">
                <i data-lucide="shield" class="large-logo-icon"></i>
                <div class="logo-text-small">THRYLOS</div>
            </div>
            
            <div class="badge">
                Secure Document Verification
            </div>

            <h1 class="main-title">
                Verify Your <span class="gradient-text">Documents</span><br>Instantly
            </h1>
            
            <p class="subtitle">
                Scan a QR code, upload an image, or enter a verification ID to instantly<br>verify the authenticity of your documents.
            </p>
        </section>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
