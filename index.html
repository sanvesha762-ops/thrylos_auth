<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THRYLOS Verify — Official Document Verification</title>
    <meta name="description" content="Verify official THRYLOS documents using QR code scanner or verification ID. Secure, trusted digital verification system.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-logo">
        <span>THRYLOS</span>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i data-lucide="shield-check" class="logo-icon"></i>
                <span class="logo-text">THRYLOS <span class="verify-text">VERIFY</span></span>
            </div>
            <button class="login-btn">
                <i data-lucide="log-in" class="login-icon"></i> Login / Sign Up
            </button>
        </div>
    </nav>

    <main class="main-container">
        <section class="hero-section">
            <div class="center-logo">
                <i data-lucide="shield" class="large-logo-icon"></i>
                <div class="logo-text-small">THRYLOS</div>
            </div>
            <div class="badge">Secure Document Verification</div>
            <h1 class="main-title">
                Verify Your <span class="gradient-text">Documents</span><br>Instantly
            </h1>
            <p class="subtitle">
                Scan a QR code, upload an image, or enter a verification ID to instantly<br>verify the authenticity of your documents.
            </p>
        </section>

        <section class="verification-card">
            <div class="tabs">
                <button class="tab-btn active" data-target="scan-tab">
                    <i data-lucide="qr-code"></i> Scan
                </button>
                <button class="tab-btn" data-target="upload-tab">
                    <i data-lucide="upload"></i> Upload
                </button>
                <button class="tab-btn" data-target="manual-tab">
                    <i data-lucide="keyboard"></i> Manual
                </button>
            </div>
            <div class="tab-content">
                <div id="scan-tab" class="tab-pane active">
                    <div class="scan-area">
                        <button class="primary-btn scan-btn">
                            <i data-lucide="camera"></i> Scan QR Code
                        </button>
                    </div>
                </div>
                <div id="upload-tab" class="tab-pane">
                    <div class="upload-area" id="drop-zone">
                        <i data-lucide="file-image" class="upload-icon"></i>
                        <p>Drag and drop your document here or click to browse</p>
                        <input type="file" id="file-input" hidden accept="image/*,.pdf">
                    </div>
                    <button class="primary-btn verify-upload-btn" disabled>
                        Verify Uploaded Document
                    </button>
                </div>
                <!-- Manual Tab -->
                <div id="manual-tab" class="tab-pane">
                    <div class="manual-input-container">
                        <div class="input-wrapper">
                            <i data-lucide="hash" class="input-icon"></i>
                            <input type="text" id="verification-id" placeholder="Enter Verification ID (e.g., THR-123456)">
                        </div>
                    </div>
                    <button class="primary-btn verify-manual-btn">
                        <i data-lucide="search"></i> Verify Document
                    </button>
                </div>
            </div>
            <div id="verification-result" class="result-container hidden"></div>
        </section>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
